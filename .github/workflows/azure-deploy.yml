name: Build, Push & Deploy to Azure

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image pushed successfully
        run: |
          echo "✅ Image pushed to GitHub Container Registry:"
          echo "   ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"

  deploy-to-azure:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Container Instances
        uses: azure/aci-deploy@v1
        with:
          resource-group: rg-faouzbot
          dns-name-label: faouzbot
          image: ghcr.io/skjuv/bot2:latest
          name: faouzbot-aci
          location: francecentral
          os-type: Linux
          cpu: 1
          memory: 1.5
          ports: "3000"
          restart-policy: Always
          azure-file-volume-account-name: safaouzbot
          azure-file-volume-account-key: ${{ secrets.AZURE_STORAGE_KEY }}
          azure-file-volume-share-name: botauth
          azure-file-volume-mount-path: /usr/src/app/auth_info
          environment-variables: |
            GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
            OWNER_NUMBERS=${{ secrets.OWNER_NUMBERS }}
            PREFIX=.
            BOT_NAME=faouzbot
            ASSISTANT_MODE=true
            UNLIMITED_MODE=true
            SYNC_FULL_HISTORY=false
            PROCESS_OLD_MESSAGES=false
            AUTO_VIEWONCE=true
            CREATOR_NAME=SKJUV
            GITHUB_LINK=https://github.com/SKJUV
            COOLDOWN_MS=3000
            COMMAND_LIMIT=3
            PORT=3000
